<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        
        <div class="w-64 bg-green-900 text-white p-5">

            <h1 class="text-xl font-bold mb-8">
                Admin
            </h1>

            <ul class="space-y-3">

                <li class="bg-green-800 p-2 rounded">
                    Dashboard
                </li>

                <li class="p-2 hover:bg-green-800 rounded">
                    Mahasiswa
                </li>

            </ul>

        </div>


        
        <div class="flex-1 flex flex-col">

            
            <div class="bg-white shadow p-4 flex justify-between">

                <h2 class="text-xl font-semibold">
                    Mahasiswa
                </h2>

                <div class="w-8 h-8 bg-gray-300 rounded-full"></div>

            </div>


            
            <div class="p-6">

                <div class="bg-white p-4 rounded shadow">

                    
                    <div class="flex justify-between mb-4">

                        <h3 class="font-semibold">
                            Daftar Mahasiswa
                        </h3>

                        <button
                            onclick="openModal()"
                            class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700"
                        >
                            + Tambah Mahasiswa
                        </button>

                    </div>


                    
                    <table class="w-full border">

                        <thead class="bg-green-900 text-white">
                            <tr>
                                <th class="p-2">NIM</th>
                                <th class="p-2">Nama</th>
                                <th class="p-2">Aksi</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr class="text-center border-t">
                                <td class="p-2">20211001</td>
                                <td class="p-2">Budi</td>
                                <td class="p-2 space-x-2">
                                    <button class="bg-yellow-500 text-white px-2 py-1 rounded">
                                        Edit
                                    </button>

                                    <button class="bg-red-600 text-white px-2 py-1 rounded">
                                        Hapus
                                    </button>
                                </td>
                            </tr>

                            <tr class="text-center border-t">
                                <td class="p-2">20211002</td>
                                <td class="p-2">Siti</td>
                                <td class="p-2 space-x-2">
                                    <button class="bg-yellow-500 text-white px-2 py-1 rounded">
                                        Edit
                                    </button>

                                    <button class="bg-red-600 text-white px-2 py-1 rounded">
                                        Hapus
                                    </button>
                                </td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>


    <div
        id="modal"
        class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center"
    >

        <div class="bg-white w-96 p-6 rounded shadow">

            <h3 class="text-lg font-semibold mb-4">
                Tambah Mahasiswa
            </h3>

            <input
                type="text"
                placeholder="NIM"
                class="w-full border p-2 mb-3 rounded"
            >

            <input
                type="text"
                placeholder="Nama"
                class="w-full border p-2 mb-4 rounded"
            >

            <div class="flex justify-end space-x-2">

                <button
                    onclick="closeModal()"
                    class="bg-gray-400 text-white px-3 py-1 rounded"
                >
                    Batal
                </button>

                <button
                    class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700"
                >
                    Simpan
                </button>

            </div>

        </div>

    </div>


    <script>

        function openModal() {
            document.getElementById('modal').classList.remove('hidden')
            document.getElementById('modal').classList.add('flex')
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden')
        }

    </script>

</body>
</html>
